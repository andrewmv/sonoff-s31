esphome:
  name: bleatbeats

esp8266:
  board: esp01_1m

wifi:
  ssid: !secret ssid  
  password: !secret wappw
  ap:
    ssid: "Bleat Beats Fallback"
    password: !secret hotspotpw  

uart:
  rx_pin: RX
  baud_rate: 4800
  parity: EVEN

captive_portal:

api:
  password: !secret apipw

# Disable logging over USB
logger:
  baud_rate: 0
  
ota:
  platform: esphome
  password: !secret apipw

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO0
      mode:
        input: true
        pullup: true
      inverted: true
    id: power_button
    internal: true
    on_press:
      - switch.toggle: relay 
  - platform: status
    name: "Bleat Beats Plug Status"

switch:
  - platform: gpio
    name: "Bleat Beats Plug Switch"
    id: relay
    pin: GPIO12

status_led:
  pin:
    inverted: True
    number: GPIO13

sensor:
  - platform: wifi_signal
    name: "Bleat Beats Plug WiFi Signal"
    update_interval: 60s
  - platform: cse7766
    current:
      name: "Bleat Beats Plug Current"
    voltage:
      name: "Bleat Beats Plug Voltage"
    power:
      name: "Bleat Beats Plug Power" 
      id: bleat_beats_plug_power
      filters:
        - multiply: 0.001
      unit_of_measurement: kW 
  - platform: total_daily_energy
    name: "Bleat Beats Plug Consumption"
    power_id: bleat_beats_plug_power

time:
  - platform: sntp
